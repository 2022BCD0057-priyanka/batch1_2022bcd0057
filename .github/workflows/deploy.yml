name: Lab Exam ML Automation (CI/CD)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  train:
    runs-on: ubuntu-latest
    env:
      ROLL_NO: 2022BCD0057

    strategy:
      matrix:
        include:
          - python-version: "3.11"
            artifact-name: batch1_2022bcd0057-py311
          - python-version: "3.12"
            artifact-name: batch1_2022bcd0057-py312

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run training script
        run: python script/train.py

      - name: Job Summary (Training)
        run: |
          echo "**Summary:** batch1_2022bcd0057" >> $GITHUB_STEP_SUMMARY
          echo "**Roll No:** $ROLL_NO" >> $GITHUB_STEP_SUMMARY
          echo "**Python Version:** ${{ matrix.python-version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Artifact Name:** ${{ matrix.artifact-name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Metrics" >> $GITHUB_STEP_SUMMARY
          cat output/metrics.json >> $GITHUB_STEP_SUMMARY

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: output/

  deploy:
    needs: train
    runs-on: ubuntu-latest
    env:
      ROLL_NO: 2022BCD0057
      IMAGE_NAME: batch1_2022bcd0057

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download artifacts (Python 3.11)
        uses: actions/download-artifact@v4
        with:
          name: batch1_2022bcd0057-py311
          path: artifacts

      - name: Read metrics
        run: |
          python - <<EOF
          import json, os
          with open("artifacts/metrics.json") as f:
              metrics = json.load(f)
          with open(os.environ["GITHUB_ENV"], "a") as env_file:
              env_file.write(f"R2={metrics['R2_Score']}\n")
          EOF

      - name: Compare metrics
        env:
          BEST_R2: ${{ vars.BEST_R2 }}
        run: |
          python - <<EOF
          import os
          current_r2 = float(os.environ["R2"])
          best_r2 = float(os.environ.get("BEST_R2", "-999"))
          if current_r2 <= best_r2:
              print(f"{os.environ['ROLL_NO']} ---- Metric did not improve")
              raise SystemExit(1)
          print("Metric improved, proceeding to deployment")
          EOF

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: 2022bcd0057priyanka/${{ env.IMAGE_NAME }}:latest

      - name: Job Summary (Deployment)
        run: |
          echo "## Lab Exam Deployment Summary" >> $GITHUB_STEP_SUMMARY

          echo "**Name:** Priyanka Kumari" >> $GITHUB_STEP_SUMMARY
          echo "**Roll No:** $ROLL_NO" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Image:** 2022bcd0057priyanka/${IMAGE_NAME}:latest" >> $GITHUB_STEP_SUMMARY

      - name: Update BEST_R2 variable
        run: |
          curl -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/variables/BEST_R2 \
            -d "{\"name\":\"BEST_R2\",\"value\":\"${R2}\"}"
